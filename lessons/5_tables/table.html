<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 80%;
            min-width: 650px;
            max-width: 800px;
            margin: 0 auto;
            border-collapse: collapse;
            font-family: Arial, Helvetica, sans-serif;
        }

        caption {
            text-transform: uppercase;
            text-align: right;
            color: #666666;
            font-weight: bold;
        }

        th {
            text-transform: uppercase;
            color: white;
        }
        th:first-child {
            color: gray;
        }
        td:first-child { 
            text-align: left;
            color: gray;
            padding-left: 0.7em;
        }

        span {
            border: 2px white solid;
            border-radius: 100%;
            text-align: center;
            color: white;
            font-weight: bold;

            display: inline-block;
            width: 25px;
            height: 25px;
        }
        td {
            text-align: center;
            color: white;
        }

        .col-1 {
            background-color: #c6c6c6;
            width: auto;
        }
        .col-2 {
            background-color: aqua;
            width: 17%;
        }
        .col-3{
            background-color: aquamarine;
            width: 17%;

        }
        .col-4 {
            background-color: coral;
            width: 17%;
        }
        .col-5 {
            background-color: crimson;
            width: 17%;
        }
        tfoot {
            border-top: solid 1px white;
        }
        thead {
            border-bottom: solid 1px white;
        }
    </style>
</head>
<body>
    <table>
        <caption>title table</caption>
        <colgroup>
        <col class="col-1">
        <col class="col-2">
        <col class="col-3">
        <col class="col-4">
        <col class="col-5">
        </colgroup>
        <thead>
            <tr>

                <th>free</th>

            </tr>

                <td><span>+</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>

            <tr>

</html>
