<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .Button{
            background-color: red;
            color: black;
            text-align: center;
            padding: 5px;
            border-radius: 15px;
            width: 100px;

        }
        .link{
            color: black;
            text-decoration: none;
            font-family: Arial, Helvetica, sans-serif;
        }
        button {
            background-color: rgb(0, 17, 255);
            color: black;
            text-align: center;
            padding: 5px;
            border-radius: 15px;
            border: none;
            width: 100px;
            margin: 5px auto;
            font-size: 1em;
            transition: all 0.8s ease-in 0s;
            transform: scale(110%);
        }
        button:hover{
            background-color: rgb(0, 255, 76);
            color: cornflowerblue;
        }
        .example {
            width: 100px;
            height: 100px;
            background-color: black;
            transition: all 0.7s ease 0s;
            margin: 3px;
            transform-origin: top left;

        }
        .translate:hover{
            transform: translate(25px, 20px);
        }
        .scale:hover{
            transform: scale(20%);
        }
        .rotate:hover{
            transform: rotate(-60deg);
        }
        .rotateX:hover{
            transform: rotateX(180deg);
        }
        .rotateY:hover{
            transform: rotateY(60deg);
        }
        .rotateZ:hover{
            transform: rotateZ(90deg) scale(20%);

        }
        .skew:hover{
            transform: skew(50deg, 10deg );

        }
        .circle-container{
            width: 400px;
            height: 400px;
            border: black solid 1px;
            background-color: chocolate;
        }
        .circle{
            width: 50px;
            height: 50px;
            border-radius: 100%;
            background-color: cyan;
            margin: 5px;
            animation-name: circle-anim;
            animation-duration: 5s;
            animation-fill-mode: backwards;
            animation-iteration-count: infinite;
        }

        @keyframes circle-anim {
            0% {
                transform: translate(0, 0);
                background-color: cyan;
            }
            25%{
                transform: translate(338px, 0);
                background-color: rgb(0, 255, 98);
            }
            50%{
                transform: translate(338px, 338px);
                background-color: darkred;
            }
            75%{
                transform: translate(0, 338px);
                background-color: darkviolet;
            }    
            100%{
                transform: translate(0, 0);
                background-color: cyan;

            }                                  
        }
    </style>
</head>
<body>

    <div class="circle-container">
        <div class="circle"></div>
    </div>



    <div class="example translate"></div>
    <div class="example scale"></div>
    <div class="example rotate"></div>
    <div class="example rotateX"></div>
    <div class="example rotateY"></div>
    <div class="example rotateZ"></div>
    <div class="example skew"></div>



    <p><a target="_self"  href="https://uk.wikipedia.org/wiki/%D0%93%D1%96%D0%BF%D0%B5%D1%80%D0%BF%D0%BE%D1%81%D0%B8%D0%BB%D0%B0%D0%BD%D0%BD%D1%8F">Гіперпосилання</a> - це елемент HTML сторінки що
    перенаправляє на інший ресурс по натисканню.</p>
    
    <div class="Button">
        <a href="#" class="link">Натисни</a>
    </div>
    <button>Klick</button>




</body>
</html>
