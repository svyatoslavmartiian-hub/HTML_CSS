<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ol.custom-list {
            list-style: none;
            padding-left: 0;

        }
        .color1 {
            background-color: rgba(165, 204, 219);
        }
        .color2 {
            background-color: rgb(226, 226, 226);
        }
        .color3 {
            background-color: rgb(173, 217,230);
        }
        .custom-list li {
            padding-left: 40px;
            margin: 0;
            min-height: 32px;
            display: flex;
            align-items: center;
        }
        .custom-list li::before {
            position: absolute;
            left: 0;
            content: "";
            width: 12px;
            height: 12px;
            background-repeat: no-repeat;
            background-size: contain;
            margin-left: 19px;

            background-image: url(./resources/unchecked_16.png);
        }
        .custom-list li.other-img::before {
            background-image: url(./resources/checked_16.png);

        }
        span {
            font-size: 9px;
            padding-left: 15px;
        }

    </style>
</head>
<body>
    <ol class="custom-list">
        
        <li class="color1">Hit the gym <span>❌</span></li>
        <li class="color2 other-img"><s>Pay bills</s> <span>❌</span></li>
        <li class="color1">Meet John <span>❌</span></li>
        <li class="color3">Buy eggc <span>❌</span></li>
        <li class="color2 other-img"><s>Read a book</s> <span>❌</span></li>
        <li class="color3">Organize office <span>❌</span></li>
        <li class="color1">Eat dinner <span>❌</span></li>
        <li class="color3">Buy apples <span>❌</span></li>
        <li class="color1">Meet George <span>❌</span></li>
        <li class="color3">Feed the cat <span>❌</span></li>
        <li class="color2 other-img"><s>Write a letter</s> <span>❌</span></li>
        <li class="color3">Run 1 km <span>❌</span></li>
    </ol>
</body>
</html>
